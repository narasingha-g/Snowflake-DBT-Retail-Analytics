version: 2

models:
  - name: dim_products

    description: Product dimension

    tests:
      - dbt_utils.unique_combination_of_columns:
           arguments:
              combination_of_columns:
                 - PRODUCT_KEY
                 - PRODUCT_ID

    columns:

      - name: PRODUCT_KEY
        tests:
          - unique
          - not_null

      - name: PRODUCT_ID
        tests:
          - unique
          - not_null