version: 2

models:
  - name: int_order_details

    description: >
      Intermediate model combining orders, items,
      payments, customers, products and sellers.

      Grain: One record per order item.
      Orders without items are retained.

    columns:

      - name: ORDER_ID
        description: "Unique order identifier."
        tests:
          - not_null

      - name: CUSTOMER_ID
        description: "Customer identifier."
        tests:
          - not_null

      - name: PRODUCT_ID
        description: "Product identifier. Nullable for orders without items."

      - name: SELLER_ID
        description: "Seller identifier. Nullable for orders without items."