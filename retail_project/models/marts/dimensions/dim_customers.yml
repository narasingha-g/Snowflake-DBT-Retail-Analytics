version: 2

models:

  - name: dim_customers

    description: >
      Customer dimension containing customer attributes
      used for analytical reporting.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - CUSTOMER_KEY
              - CUSTOMER_ID

    columns:

      - name: CUSTOMER_KEY
        description: "Surrogate key for customer dimension."
        tests:
          - not_null
          - unique

      - name: CUSTOMER_ID
        description: "Source customer identifier."
        tests:
          - not_null