version: 2

models:
  - name: dim_sellers

    description: Seller dimension

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - SELLER_KEY
              - SELLER_ID

    columns:

      - name: SELLER_KEY
        tests:
          - unique
          - not_null

      - name: SELLER_ID
        tests:
          - unique
          - not_null