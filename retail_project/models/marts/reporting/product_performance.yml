version: 2

models:

  - name: product_performance
    description: Product level sales analytics.

    columns:

      - name: PRODUCT_KEY
        tests:
          - not_null
          - unique

      - name: PRODUCT_ID
        tests:
          - not_null

      - name: PRODUCT_CATEGORY_NAME
        tests:
          - not_null

      - name: TOTAL_REVENUE
        description: Total revenue generated by the product.

      - name: TOTAL_ITEMS_SOLD
        description: Number of product items sold.