version: 2

models:
  - name: seller_performance
    description: Seller performance analytics mart.

    columns:
      - name: SELLER_KEY
        tests:
          - unique
          - not_null

      - name: SELLER_ID
        tests:
          - not_null

      - name: TOTAL_REVENUE
        description: Total revenue generated by the seller.

      - name: TOTAL_ORDERS
        tests:
          - not_null

      - name: TOTAL_ITEMS_SOLD
        tests:
          - not_null